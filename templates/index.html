<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boat Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <span class="vessel-name">VESSEL — {{ config.vessel_name }}</span>
    </div>
    <div class="topbar-center">
      <span id="clock">--:--:--</span>
    </div>
    <div class="topbar-right">
      <span class="status-dot" id="conn-dot"></span>
      <span id="conn-label">CONNECTING</span>
    </div>
  </header>

  <main class="dashboard">

    <!-- ROW 1 -->
    <div class="card card--large" id="card-depth">
      <div class="card-label">DEPTH</div>
      <div class="card-value" id="depth">--.-</div>
      <div class="card-unit">ft</div>
      <div class="depth-bar-wrap">
        <div class="depth-bar" id="depth-bar"></div>
      </div>
    </div>

    <div class="card card--small">
      <div class="card-label">BATTERY</div>
      <div class="card-value card-value--sm" id="battery">--.-</div>
      <div class="card-unit">V</div>
      <div class="batt-bar-wrap">
        <div class="batt-bar" id="batt-bar"></div>
      </div>
    </div>

    <div class="card card--small">
      <div class="card-label">GPS</div>
      <div class="gps-coords">
        <div class="gps-line" id="lat">---.------° N</div>
        <div class="gps-line" id="lon">---.------° W</div>
      </div>
    </div>

    <!-- ROW 2 -->
    <div class="card card--wide">
      <div class="card-label">FISHING ADVISOR</div>
      <div class="card-value card-value--sm" id="advisor-summary">
        -- • -- • --°F
      </div>
      <div class="advisor-status" id="advisor-status">
        Waiting for conditions...
      </div>

      <div class="advisor-section">
        <div class="card-label">LIKELY ACTIVE</div>
        <div id="likely-active">--</div>
      </div>

      <div class="advisor-section">
        <div class="card-label">SUGGESTED BAITS</div>
        <div id="suggested-baits">--</div>
      </div>

      <div class="advisor-update">
        Updated <span id="advisor-updated">--:--:--</span>
      </div>
    </div>

    <div class="card card--small">
      <div class="card-label">TRIP TIMER</div>
      <div class="card-value card-value--sm" id="trip-timer">
        0:00:00
      </div>
    </div>

    <!-- ROW 3 -->
    <div class="card card--log">
      <div class="card-label">LOG CATCH</div>

      <form id="catch-form" method="POST" action="/api/log_catch">

        <label for="species">SPECIES</label>
        <select id="species" name="species">
          {% for species in config.species_list %}
            <option value="{{ species }}">{{ species }}</option>
          {% endfor %}
        </select>

        <label for="bait">BAIT USED</label>
        <select id="bait" name="bait">
          {% for bait in config.bait_list %}
            <option value="{{ bait }}">{{ bait }}</option>
          {% endfor %}
        </select>

        <div class="button-row">
          <button type="button" onclick="this.form.reset();">
            CANCEL
          </button>
          <button type="submit">
            SAVE CATCH
          </button>
        </div>

      </form>
    </div>

  </main>

  <script src="/static/script.js"></script>

</body>
</html>
